server {
    listen 80;
    server_name _;

    # Servir o Frontend React
    location / {
        root /var/www/dacomp-guessr;
        index index.html;
        try_files $uri /index.html;
    }

    # Encaminhar chamadas de API para o Backend (ex: porta 8000)
    location /api/ {
    	proxy_pass http://localhost:8000; 
    	proxy_set_header Host $host; # <--- Isso passa o domínio do Cloudflare adiante
    	proxy_set_header X-Real-IP $remote_addr;
    	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    	proxy_set_header X-Forwarded-Proto $scheme;
	}
    location /ws/ {
    	proxy_pass http://localhost:8000; # Sem barra no final para manter o caminho original
    	proxy_http_version 1.1;
    	proxy_set_header Upgrade $http_upgrade;
    	proxy_set_header Connection "upgrade";

    	proxy_set_header Host $host;
    	proxy_set_header X-Real-IP $remote_addr;
    	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    	proxy_set_header X-Forwarded-Proto $scheme;

    	# Timeout longo para o jogo não cair se ninguém mexer por 1 minuto
    	proxy_read_timeout 86400;
	}
    location /media/ {
    	# Caminho absoluto para a pasta media do seu projeto Django no Arch
    	alias /home/ultra/Documents/Bobagens/DACOMP_Geoguessr/backend/DACOMP_Guessr/media/;
    	expires 7d;
    	add_header Cache-Control "public";
}

}
